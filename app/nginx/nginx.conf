# ─────────────────────────────────────────────────────────────────
#  nginx Load Balancer  — round-robin across 3 app instances
#  Each "server" maps to a Docker service name (app1 / app2 / app3)
# ─────────────────────────────────────────────────────────────────

events {
    worker_connections 1024;
}

http {
    # ── Upstream pool ────────────────────────────────────────────
    upstream app_cluster {
        # Default: round-robin
        # Use "least_conn;" for fewest-connections balancing
        # Use "ip_hash;"    for sticky sessions (same IP → same backend)
        least_conn;

        server app1:3000 max_fails=3 fail_timeout=30s;
        server app2:3000 max_fails=3 fail_timeout=30s;
        server app3:3000 max_fails=3 fail_timeout=30s;
    }

    # ── Logging ──────────────────────────────────────────────────
    log_format main '$remote_addr - $upstream_addr "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time';

    access_log /var/log/nginx/access.log main;

    # ── Server block ─────────────────────────────────────────────
    server {
        listen 80;

        # Propagate upstream instance info to client
        add_header X-Upstream-Addr $upstream_addr;

        location / {
            proxy_pass         http://app_cluster;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Connection        "";

            # Timeouts
            proxy_connect_timeout 5s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }

        # Health endpoint for monitoring
        location /nginx-health {
            return 200 "nginx ok\n";
            add_header Content-Type text/plain;
        }
    }
}